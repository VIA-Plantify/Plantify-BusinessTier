name: dev

services:
  businessdev:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    container_name: businessdev
    volumes:
      - .:/workspace
    working_dir: /workspace
    command: sleep infinity
    user: root
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Grpc__ServerUrl: http://grpcserver:10081
    networks:
      - backend
networks:
  backend:
    external: true
    name: backend