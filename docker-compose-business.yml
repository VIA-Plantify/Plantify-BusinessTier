services:
  businessdev:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    container_name: businessdev
    volumes:
      - .:/workspace
    working_dir: /workspace
    command: sleep infinity
    user: root
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Grpc__ServerUrl: http://grpcserver:8080
    networks:
      - app-network

  webapi:
    image: webapi
    build:
      context: .
      dockerfile: WebAPI/Dockerfile
    container_name: webapi
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://0.0.0.0:8081
      Grpc__ServerUrl: http://grpcserver:8080
    ports:
      - "8081:8081"
    networks:
      - app-network

networks:
  app-network:
    name: app-network
    external: true